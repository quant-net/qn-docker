[common]
logdir = /var/log/quantnet
loglevel = INFO

[agent]
threads = 8

[mq]
host=broker
port=1883

[interpreters]
path=/qn-plugins/plugins/pingpong/interpreter

[schemas]
path=/qn-plugins/plugins/schema

[protocols]
# usercalibration=test_interpreter.py
pingpong=pingpong.py

[devices]
[[exp_framework]]
enabled=true
type=Exp_Framework
driver=DummyExpFramework

# enabled=false
# type=Exp_Framework
# driver=ArtiqClient
# host=::1
# port=3251

[[lightsource]]
enabled=true
type=Light_Source
# driver=overlay
# device=/dev/ttyACM0
# baud_rate=9600
# bsm_ip=10.0.0.7
# bsm_port=55180
driver=DummyLightSrc

[[epc]]
enabled=true
type=Filter
driver=DummyEPC
# psg_ip=
# psg_port=
# driver=OZoptics
# port=/dev/ttyUSB0
# baudrate=9600

[[polarimeter]]
enabled=true
type=Light_Measurement
driver=DummyPolarimeter
# driver=Thorlabs
# device=/dev/usbtmc0

[[egp]]
enabled=true
type=EGP
driver=SimEGPDriver
protocol=EGProtocol

[[messaging]]
enabled=true
type=Messaging
driver=PassthroughDriver

[tasks]
[[downhill_calibration1]]
path=downhill_calibration1.json

[[downhill_calibration2]]
path=downhill_calibration2.json

[[downhill_calibration3]]
path=downhill_calibration3.json

[[downhill_calibration4]]
path=downhill_calibration4.json